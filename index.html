<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Proyectos - Unfixed-code</title>
    
    <div>
    <style>
        /* Estilos generales dentro del mismo index para no "desordenar" las carpetas de cada proyecto */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }
        h1, h2 {
            color: #fc6f03;
            font-size: 4.5vh;
            margin-bottom: 40px;
            padding: 0 20px;
            text-shadow: 1px 1px 8px rgba(255, 0, 0, 0.411);
            max-width: 800px;
        }

        h2 {
            font-size: 1.8vh;
            text-shadow: 1.5px 1.5px 25px white;

        }

        .botones-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .btn-proyecto {
            background-color: #2d2d2d;
            color: #ffffff;
            border: 2px solid #fc6f03;
            border-radius: 8px;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-proyecto:hover {
            background-color: #fc6f03;
            color: #1a1a1a;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(252, 111, 3, 0.4);
        }

        .btn-proyecto span {
            font-size: 0.9rem;
            font-weight: normal;
            opacity: 0.9;
        }

        #footerfull {
            background: linear-gradient(to bottom, var(--color-fondo-principal), var(--color-texto-principal) 20%);
            color: var(--color-texto-claro);
            padding: 80px 20px 30px 20px;
            margin-top: 60px;
            text-align: center;
        }
        #footerfull p {
            margin: 10px 0;
        }
        #footerfull h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: var(--color-acento);
            text-shadow: 0 0 5px var(--color-acento);
            font-family: var(--fuente-titulos);
        }

        .btn-idioma {
            position: absolute;
            top: 20px;
            right: 30px;
            padding: 10px 20px;
            font-size: 1rem;
            flex-direction: row;
            z-index: 1000;
        }

        #google_translate_element {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0.001;
            z-index: -1;
        }

        .skiptranslate iframe {
            display: none !important;
        }

        body {
            top: 0 !important;
        }

        .enlace {
            color: #fc6f03;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .enlace:hover {
            color: #ff8c00;
            text-shadow: #fc6f03 0px 0px 10px;
            transform: scale(1.05);
        }
    </style> 
    </div>
</head>
<body>

    <button id="btn-traducir" class="btn-proyecto btn-idioma" onclick="cambiarIdiomaPersonalizado()">
        🌐 English
    </button>

    <div id="google_translate_element"></div>

    <h1>Seleccione el proyecto que va a visualizar para continuar...</h1> 

    <h2>Tenga en cuenta que una vez seleccionado, no habra un botón para retornar a este menú</h2>
    
    <div class="botones-container">
        <button class="btn-proyecto" onclick="irAPPoT()">
            🎮 Proyecto PPoT (HTML, JS)
            <span>(Piedra, Periódico, Tijeras)</span>
        </button>

        <button class="btn-proyecto" onclick="irAWeb()">
            🌐 Proyecto Web (HTML, CSS, JS)
            <span>(Sitio de Restaurante)</span>
        </button>

        <button class="btn-proyecto" onclick="irABusqueda()">
            🕵️‍♂️ Búsqueda Lineal y Binaria (JS)
            <span>(Proyectos pequeños)</span>
        </button>

        <button class="btn-proyecto" onclick="irATricky()">
            🎮 Juego de Tic Tac Toe (JS)
            <span>(Proyectos pequeños)</span>
        </button>

        <button class="btn-proyecto" onclick="irAFibonacci()">
            ✖ Secuencia de Fibonacci (JS)
            <span>(Proyectos pequeños)</span>
        </button>
    </div>

    <script>
        function irAPPoT() {
            window.location.href = 'OtrosAlgoritmos/PPoT/Index.html';
        }

        function irAWeb() {
            window.location.href = 'Web/PrimerCiclo/PaginaCSS-JS/index.html';
        }

        function irABusqueda() {
            window.location.href = 'OtrosAlgoritmos/Busqueda/index.html'
        }

        function irAPruebasJS() {
            window.location.href = 'OtrosAlgoritmos/index.html'
        }

        function irATricky() {
            window.location.href = 'OtrosAlgoritmos/Tricky/index.html';
        }

        function irAFibonacci() {
            window.location.href = 'OtrosAlgoritmos/Fibonacci/index.html';
        }

        function cambiarIdiomaPersonalizado() {
            var boton = document.getElementById('btn-traducir');
            var select = document.querySelector('.goog-te-combo');
            
            if (select) {
                if (boton.innerText.includes('English')) {
                    select.value = 'en';
                    boton.innerText = '🌐 Español';
                } else {
                    select.value = 'es';
                    boton.innerText = '🌐 English';
                }
                
                select.dispatchEvent(new Event('change', { bubbles: true }));
            } else {
                alert("El traductor de Google aún está cargando, intenta en un segundo.");
            }
        }
    </script>
    <footer id="footerfull">
        <hr>
        <p><strong>Portal de Proyectos de Programación</strong></p>
        <p>Creado por: <strong><a href="https://www.github.com/unfixedcode" alt="Perfil Github" class="enlace" target="_blank">Angel Felipe Ayala</a></strong></p>
        <p>Politécnico Internacional</p>
        <h5>Traducciones por Google Translate</h5>
    </footer>
    
    <script type="text/javascript"> // Script encontrado en internet para aplicar G translate a la página 
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'es',
                includedLanguages: 'es,en'
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
