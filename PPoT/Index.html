<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica JS</title>
</head>
<body>
    <script>
        // Suma
            let tipocalc, num1, num2, respuesta
                tipocalc = "SUMAR"
                num1 = parseInt(prompt("Escribe el primer número que vamos a "+tipocalc))
                num2 = parseInt(prompt("Ingrese el segundo número que vamos a "+tipocalc))
                respuesta = num1 + num2
            alert("Al "+tipocalc+" da: "+respuesta)

        // Resta
            tipocalc = "RESTAR"
            num1 = parseInt(prompt("Escribe el primer número que vamos a "+tipocalc))
            num2 = parseInt(prompt("Ingrese el segundo número que vamos a "+tipocalc))
            respuesta = num1 - num2
            alert("Al "+tipocalc+" da: "+respuesta)

        // Multiplicar
            tipocalc = "MULTIPLICAR"
            num1 = parseInt(prompt("Escribe el primer número que vamos a "+tipocalc))
            num2 = parseInt(prompt("Ingrese el segundo número que vamos a "+tipocalc))
            respuesta = num1 * num2
            alert("Al "+tipocalc+" da: "+respuesta)

        // Dividir
            tipocalc = "DIVIDIR"
            num1 = parseInt(prompt("Escribe el primer número que vamos a "+tipocalc))
            num2 = parseInt(prompt("Ingrese el segundo número que vamos a "+tipocalc))
            respuesta = num1 / num2
            alert("Al "+tipocalc+" da: "+respuesta)
        // Condicionales
            if(num1>num2){
                alert("El número mayor es "+num1)
            } else {
               alert("El número mayor es "+num2)
            }
        
    </script>
</body>
</html>
